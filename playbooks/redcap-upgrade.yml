---
- name: Upgrade REDCap
  hosts: redcap
  become: true
  gather_facts: true
  vars:
    redcap_operation: upgrade
  pre_tasks:
    - name: Confirm upgrade guardrails
      ansible.builtin.assert:
        that:
          - redcap_allow_upgrade | bool
          - redcap_environment != 'production' or redcap_allow_production | bool
        fail_msg: >-
          Refusing to upgrade REDCap. Set redcap_allow_upgrade=true and keep
          redcap_environment non-production unless redcap_allow_production=true
          is explicitly set.

    - name: Check existing REDCap application path
      ansible.builtin.stat:
        path: "{{ redcap_web_root }}"
      register: redcap_upgrade_app_path

    - name: Check existing REDCap database.php
      ansible.builtin.stat:
        path: "{{ redcap_database_php_path }}"
      register: redcap_upgrade_database_php

    - name: Validate upgrade prerequisites
      ansible.builtin.assert:
        that:
          - redcap_upgrade_app_path.stat.isdir | default(false)
          - redcap_upgrade_database_php.stat.exists | default(false)
        fail_msg: >-
          Refusing to upgrade because the existing REDCap path or database.php
          was not found.

  # Restore roles, create a maintanence mode role, and add a task to enable maintenance mode before the upgrade and disable it after the upgrade.
  # The maintenance mode role should have a variable to control whether it is enabled or disabled.
  # roles:
  #   - role: redcap_artifact
  #   - role: redcap_backup
  #   - role: redcap_app
  #   - role: redcap_sql
  #   - role: redcap_security
  #   - role: redcap_validate

  tasks:
    - name: Run REDCap upgrade workflow
      block:
        - name: Enable REDCap maintenance mode
          ansible.builtin.import_role:
            name: redcap_maintenance
          vars:
            redcap_maintenance_state: offline
          when: redcap_maintenance_during_upgrade | default(true) | bool

        - name: Resolve REDCap upgrade artifact
          ansible.builtin.import_role:
            name: redcap_artifact

        - name: Back up REDCap before upgrade
          ansible.builtin.import_role:
            name: redcap_backup

        - name: Upgrade REDCap application files
          ansible.builtin.import_role:
            name: redcap_app

        - name: Apply REDCap upgrade SQL
          ansible.builtin.import_role:
            name: redcap_sql

        - name: Apply REDCap security controls
          ansible.builtin.import_role:
            name: redcap_security

        - name: Validate REDCap after upgrade
          ansible.builtin.import_role:
            name: redcap_validate

        # - name: Mark REDCap upgrade as successful
        #   ansible.builtin.set_fact:
        #     redcap_upgrade_successful: true

      # rescue:
      #   - name: Mark REDCap upgrade as failed
      #     ansible.builtin.set_fact:
      #       redcap_upgrade_successful: false

      #   - name: Fail upgrade with rollback instructions
      #     ansible.builtin.fail:
      #       msg: |
      #         REDCap upgrade failed.

      #         The REDCap database may now be in a partially upgraded state.
      #         Do not re-run the upgrade until rollback has completed successfully.

      #         To rollback to the previous REDCap version, run:

      #         ansible-playbook playbooks/redcap-rollback.yml \
      #           -i inventories/staging/hosts.yml \
      #           -e redcap_allow_rollback=true \
      #           -e redcap_restore_db_dump={{ redcap_backup_sql_path | default('BACKUP_SQL_PATH_NOT_SET') }} \
      #           -e redcap_restore_web_archive={{ redcap_backup_web_path | default('BACKUP_WEB_PATH_NOT_SET') }}

      always:
        - name: Disable REDCap maintenance mode
          ansible.builtin.import_role:
            name: redcap_maintenance
          vars:
            redcap_maintenance_state: online
          when:
            - redcap_maintenance_during_upgrade | default(true) | bool
            - redcap_maintenance_restore_after_upgrade | default(true) | bool
