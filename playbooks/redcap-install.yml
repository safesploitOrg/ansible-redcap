---
- name: Install REDCap
  hosts: redcap
  become: true
  gather_facts: true
  vars:
    redcap_operation: install
  pre_tasks:
    - name: Confirm install guardrails
      ansible.builtin.assert:
        that:
          - redcap_allow_install | bool
          - redcap_environment != 'production' or redcap_allow_production | bool
        fail_msg: >-
          Refusing to install REDCap. Set redcap_allow_install=true and keep
          redcap_environment non-production unless redcap_allow_production=true
          is explicitly set.

  roles:
    - role: common
    - role: redcap_artifact
    - role: mariadb
    - role: httpd
    - role: php_fpm
    - role: redcap_app
    - role: redcap_sql
    - role: redcap_security
    - role: redcap_validate

  post_tasks:
    - name: Display REDCap installation details
      ansible.builtin.debug:
        msg: "REDCap installation completed. Details saved to {{ redcap_install_details_path }}."
    - name: Display REDCap FQDN
      ansible.builtin.debug:
        msg: "REDCap is accessible at https://{{ redcap_fqdn }}/"
    # Do this properly with a role in the future
    - name: Edit REDCap authentication to table or SSO
      ansible.builtin.debug:
        msg: "Edit REDCap authentication:  Control Center>Security & Authentication Configuration>Authentication Settings (System-level)>Authentication Method: Table-based or SSO. This is a placeholder for future implementation."
    - name: Create a REDCap superuser account
      ansible.builtin.debug:
        msg: "Creating REDCap superuser account {{ redcap_admin_username }} with email {{ redcap_admin_email }} using redcap_set_superuser.sh and reset-redcap-password.php scripts."
